<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumo ao Hexa Manager 2030</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // --- COLE O SEU FIREBASE CONFIG AQUI ---
        const firebaseConfig = {
  apiKey: "AIzaSyAn-IvB6iQ3RWSQ8uXkcy9OaG1mJz3es9w",
  authDomain: "rumo-ao-hexa-2030.firebaseapp.com",
  projectId: "rumo-ao-hexa-2030",
  storageBucket: "rumo-ao-hexa-2030.firebasestorage.app",
  messagingSenderId: "1019221681113",
  appId: "1:1019221681113:web:eab016e8501873a6db2fc8",
  measurementId: "G-506DCZ19G7"
};
        // ---------------------------------------

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [gameState, setGameState] = useState(null);

            useEffect(() => {
                signInAnonymously(auth);
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const loadSave = async () => {
                    const docRef = doc(db, 'saves', user.uid);
                    const snap = await getDoc(docRef);
                    if (snap.exists()) setGameState(snap.data());
                };
                loadSave();
            }, [user]);

            const salvar = async (novoEstado) => {
                setGameState(novoEstado);
                if (user) {
                    await setDoc(doc(db, 'saves', user.uid), novoEstado);
                }
            };

            return (
                <div className="p-4 text-white font-mono">
                    <h1 className="text-2xl text-yellow-400">Rumo ao Hexa 2030</h1>
                    <p>Estado do Save: {user ? "Ligado à Nuvem ✅" : "A ligar..."}</p>
                    {/* Resto do jogo aqui */}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
