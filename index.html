<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumo ao Hexa Manager 2030</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { getAnalytics } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAn-IvB6iQ3RWSQ8uXkcy9OaG1mJz3es9w",
            authDomain: "rumo-ao-hexa-2030.firebaseapp.com",
            projectId: "rumo-ao-hexa-2030",
            storageBucket: "rumo-ao-hexa-2030.firebasestorage.app",
            messagingSenderId: "1019221681113",
            appId: "1:1019221681113:web:eab016e8501873a6db2fc8",
            measurementId: "G-506DCZ19G7"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [gameState, setGameState] = useState({ nomeTreinador: "Mister", mes: 1 });

            useEffect(() => {
                signInAnonymously(auth);
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const loadSave = async () => {
                    const docRef = doc(db, 'saves', user.uid);
                    const snap = await getDoc(docRef);
                    if (snap.exists()) setGameState(snap.data());
                };
                loadSave();
            }, [user]);

            const salvar = async (novoEstado) => {
                setGameState(novoEstado);
                if (user) await setDoc(doc(db, 'saves', user.uid), novoEstado);
            };

            return (
                <div className="max-w-md mx-auto bg-gray-800 min-h-screen p-4 text-white font-mono shadow-2xl">
                    <h1 className="text-2xl text-yellow-400 text-center mb-4 uppercase">Rumo ao Hexa 2030</h1>
                    <p className="text-center text-sm">Treinador: {gameState.nomeTreinador}</p>
                    <p className="text-center mt-2">Mês Atual: {gameState.mes}</p>
                    <button 
                        onClick={() => salvar({...gameState, mes: gameState.mes + 1})}
                        className="w-full bg-green-600 p-3 mt-4 rounded font-bold hover:bg-green-500 transition-colors"
                    >
                        Avançar Mês
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
